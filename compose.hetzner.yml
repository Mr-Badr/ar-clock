services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-miqatona.com}
      SITE_DOMAIN_WWW: ${SITE_DOMAIN_WWW:-www.miqatona.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/hetzner/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_OUTPUT_MODE: standalone
    image: miqatona/app:local
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NEXT_OUTPUT_MODE: standalone
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:16-bookworm
    profiles: ["postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-miqatona}
      POSTGRES_USER: ${POSTGRES_USER:-miqatona}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-miqatona} -d ${POSTGRES_DB:-miqatona}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
