proxy_http_version 1.1;

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;

# Header buffers matter even when response buffering is disabled. This protects
# against large upstream Link/metadata headers from Next.js pages and OG routes.
proxy_buffer_size 128k;
proxy_buffers 8 128k;

# Next.js streams HTML and RSC chunks. Disabling buffering and gzip here avoids
# delayed flushes that can leave Safari/WebKit with a partial page shell.
proxy_connect_timeout 10s;
proxy_buffering off;
proxy_request_buffering off;
proxy_redirect off;
gzip off;
proxy_read_timeout 75s;
proxy_send_timeout 75s;
