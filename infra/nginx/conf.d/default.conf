upstream next_app {
    server app:3000;
    keepalive 32;
}

# -----------------------------
# HTTP → HTTPS redirect
# -----------------------------
server {
    listen 80;
    server_name staging.miqatona.com;

    # Health check (HTTP فقط)
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # redirect everything to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------
# HTTPS MAIN SERVER
# -----------------------------
server {
    listen 443 ssl http2;
    server_name staging.miqatona.com;

    # SSL certificates
    ssl_certificate     /etc/nginx/ssl/staging.crt;
    ssl_certificate_key /etc/nginx/ssl/staging.key;

    # 🔐 security hardening (recommended)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    include /etc/nginx/snippets/security.conf;

    # SEO safety (staging)
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    # -----------------------------
    # Health check
    # -----------------------------
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # -----------------------------
    # API health
    # -----------------------------
    location = /api/health {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://next_app;
    }

    # -----------------------------
    # Next.js static files (cache)
    # -----------------------------
    location /_next/static/ {
        include /etc/nginx/snippets/static-cache.conf;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://next_app;
    }

    # -----------------------------
    # Main app
    # -----------------------------
    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://next_app;
    }
}
