server {
    listen 80;
    server_name staging.miqatona.com miqatona.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ✅ IMPORTANT: health check must NOT redirect
    location = /api/health {
        proxy_pass http://app:3000/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # everything else redirects to https
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;

    server_name staging.miqatona.com miqatona.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    # =========================
    # UPSTREAM (Docker service)
    # =========================
    set $upstream http://app:3000;

    # =========================
    # NEXT.JS STATIC ASSETS
    # Served via proxy but with immutable cache + buffering.
    # These files have content-hash names so can be cached forever.
    # =========================
    location /_next/static/ {
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # =========================
    # OG IMAGE ROUTES
    # Next.js opengraph-image generation is slow on first render
    # (DB query + canvas = 30-60s cold). Must have a long timeout
    # or Nginx returns 502 before the image is ready.
    # Also set noindex at this layer so Google never indexes these URLs.
    # =========================
    location ~* /opengraph-image {
        proxy_pass $upstream;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    # =========================
    # MAIN PROXY
    # =========================
    location / {
        proxy_pass $upstream;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # =========================
    # API (same behavior as /)
    # =========================
    location /api/ {
        proxy_pass $upstream;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # =========================
    # HEALTH CHECK (IMPORTANT)
    # =========================
    
    location = /api/health {
        proxy_pass http://app:3000/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

     location = /nginx-health {
        access_log off;
        return 200 "ok";
    }

    # =========================
    # SECURITY HEADERS (optional but good)
    # =========================
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
}
