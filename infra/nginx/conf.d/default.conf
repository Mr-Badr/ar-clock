server {
    listen 80;
    server_name staging.miqatona.com miqatona.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ✅ IMPORTANT: health check must NOT redirect
    location = /api/health {
        proxy_pass http://app:3000/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # everything else redirects to https
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;

    server_name staging.miqatona.com miqatona.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    # =========================
    # UPSTREAM (Docker service)
    # =========================
    set $upstream http://app:3000;

    # =========================
    # MAIN PROXY
    # =========================
    location / {
        proxy_pass $upstream;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # =========================
    # API (same behavior as /)
    # =========================
    location /api/ {
        proxy_pass $upstream;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # =========================
    # HEALTH CHECK (IMPORTANT)
    # =========================
    
    location = /api/health {
        proxy_pass http://app:3000/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

     location = /nginx-health {
        access_log off;
        return 200 "ok";
    }

    # =========================
    # SECURITY HEADERS (optional but good)
    # =========================
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
}
