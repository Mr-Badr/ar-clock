services:
  app:
    image: ghcr.io/mr-badr/ar-clock:staging
    env_file:
      - /opt/miqatona/env/staging.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-miqatona_staging}
      POSTGRES_USER: ${POSTGRES_USER:-miqatona}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-miqatona} -d ${POSTGRES_DB:-miqatona_staging}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    shm_size: 256mb
    networks:
      - backend

  nginx:
   ports:
      - "80:80"

volumes:
  postgres-data:

networks:
  backend:
    driver: bridge

