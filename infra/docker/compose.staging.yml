services:
  app:
    image: ${APP_IMAGE:-ghcr.io/mr-badr/ar-clock}:${APP_TAG:-staging}

    env_file:
      - /opt/miqatona/env/staging.env

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=384"

    restart: unless-stopped

    mem_limit: 768m
    mem_reservation: 384m

    ports:
      - "3000:3000"

    expose:
      - "3000"

    networks:
      - backend

    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-bookworm

    restart: unless-stopped

    env_file:
      - /opt/miqatona/env/staging.env

    volumes:
      - pgdata-staging:/var/lib/postgresql/data

    networks:
      - backend

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miqatona -d miqatona_staging"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata-staging:

networks:
  backend:
    driver: bridge
