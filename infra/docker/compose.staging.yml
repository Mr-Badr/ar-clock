services:
  app:
    image: ${APP_IMAGE:-ghcr.io/mr-badr/ar-clock}:${APP_TAG:-staging}
    env_file:
      - /opt/miqatona/env/staging.env

    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=384"

    restart: unless-stopped

    mem_limit: 768m
    mem_reservation: 384m

    networks:
      - backend

    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
  # healthcheck:
     #test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
     #interval: 20s
     #timeout: 5s
     #retries: 5
     #start_period: 90s

  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped

    env_file:
      - /opt/miqatona/env/staging.env

    volumes:
      - pgdata-staging:/var/lib/postgresql/data

    networks:
      - backend

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miqatona -d miqatona_staging"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    dns:
      - 127.0.0.11
    restart: unless-stopped

    depends_on:
      app:
        condition: service_healthy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/snippets:/etc/nginx/snippets:ro
      - /opt/miqatona/ssl:/etc/nginx/ssl:ro

    networks:
      - backend
      - edge

volumes:
  pgdata-staging:

networks:
  backend:
    external: false
  edge:
    external: false
