x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-common: &app-common
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging: *default-logging

services:
  app:
    <<: *app-common

    build:
      context: ../..
      dockerfile: Dockerfile

    image: ${APP_IMAGE:-ghcr.io/mr-badr/ar-clock}:${APP_TAG:-latest}

    expose:
      - "3000"

    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NODE_OPTIONS: "--max-old-space-size=512"

    mem_limit: 768m
    memswap_limit: 1g

    env_file:
      - ../env/.env.production

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 90s

    stop_grace_period: 30s

    networks:
      - backend

  nginx:
    restart: unless-stopped
    image: nginx:1.27-alpine

    depends_on:
      app:
        condition: service_healthy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/snippets:/etc/nginx/snippets:ro
      - /etc/letsencrypt/live/staging.miqatona.com:/etc/nginx/ssl:ro
      - /opt/miqatona/logs/nginx:/var/log/nginx
      - /opt/miqatona/certbot:/var/www/certbot

    read_only: true

    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run

    networks:
      - backend

networks:
  backend:
    driver: bridge
