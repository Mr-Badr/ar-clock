name: Deploy Staging

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. تسجيل الدخول إلى GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. بناء Docker image
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/mr-badr/ar-clock:staging .

      # 4. رفع image
      - name: Push Docker image
        run: |
          docker push ghcr.io/mr-badr/ar-clock:staging

      # 5. Deploy على VPS عبر SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/miqatona/apps/staging/current
            docker compose -f infra/docker/compose.base.yml -f infra/docker/compose.staging.yml pull
            docker compose -f infra/docker/compose.base.yml -f infra/docker/compose.staging.yml up -d
