name: Deploy Staging

concurrency:
  group: staging-deploy
  cancel-in-progress: true

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login to GitHub Container Registry (GHCR)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Set up Docker Buildx (better caching + performance)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build & Push Docker image
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mr-badr/ar-clock:staging
            ghcr.io/mr-badr/ar-clock:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Deploy to VPS via SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/miqatona/apps/staging/current

            docker compose -f infra/docker/compose.base.yml -f infra/docker/compose.staging.yml pull

            docker compose -f infra/docker/compose.base.yml -f infra/docker/compose.staging.yml up -d --remove-orphans
