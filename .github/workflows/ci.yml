name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. تحميل الكود
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. إعداد Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. تثبيت dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Prisma generate (مهم لمشروعك)
      - name: Generate Prisma Client
        run: npm run prisma:generate

      # 5. Type checking (يحميك من bugs كبيرة)
      - name: Type check
        run: npm run typecheck

      # 6. Build المشروع
      - name: Build Next.js app
        run: npm run build
